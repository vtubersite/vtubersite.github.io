<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>暁ほのか | VTuber</title><style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap');:root{--main:#9146ff;--accent:#00f0ff;}*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Noto Sans JP',sans-serif;background:#0a0a0f;color:#e0e0ff;overflow-x:hidden;}body::after{content:"";position:fixed;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,240,255,0.02) 2px,rgba(0,240,255,0.02) 4px);pointer-events:none;}#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}.fade{opacity:0;transform:translateY(20px);transition:0.8s;}.fade.show{opacity:1;transform:translateY(0);}@keyframes glitch{0%,100%{text-shadow:0 0 15px rgba(0,240,255,0.5);}25%{text-shadow:-2px 0 #ff006680,2px 0 #00f0ff80;}75%{text-shadow:2px 0 #ff006680,-2px 0 #00f0ff80;}}.banner img{width:100%;height:260px;object-fit:cover;border-bottom:2px solid var(--main);}.hero{text-align:center;padding:40px 20px;}.avatar{width:140px;height:140px;border-radius:12px;border:3px solid var(--main);margin-top:-70px;box-shadow:0 0 25px rgba(145,70,255,0.5);}.name{font-family:"Orbitron",sans-serif;font-size:1.8rem;color:var(--accent);margin-top:12px;animation:glitch 4s infinite;}.tagline{color:var(--main);margin-top:6px;}.notice-fixed{margin-top:12px;display:inline-block;padding:8px 18px;border:1px solid var(--main);border-radius:20px;color:var(--accent);background:rgba(20,20,40,0.6);}.section{max-width:480px;margin:40px auto;padding:0 20px;position:relative;z-index:1;}.section-title{text-align:center;font-family:"Orbitron";color:var(--accent);margin-bottom:16px;}.links{display:flex;flex-direction:column;gap:12px;}.link-btn{background:#12121f;padding:14px;border-radius:8px;text-align:center;text-decoration:none;color:#e0e0ff;border:1px solid #2a2a4a;transition span><span>11月14日（天使の日って覚えてね）</span></div><div class="profile-item"><span class="profile-label">好きなこと</span><span>お歌、ゲーム</span></div></div></div><div class="section fade"><div class="section-title">FAVORITE</div><div class="profile-box"><div class="profile-item"><span class="profile-label">ゲーム</span><span>雀魂、OW</span></div><div class="profile-item"><span class="profile-label">食べ物</span><span>トマト</span></div></div></div><div class="section fade"><div class="section-title">MESSAGE</div><div class="tag-box">いつも応援ありがとう！</div></div><footer>Designed by web&#23627;&#12354;&#12363;&#12388;&#12365;</footer><script>const fades=document.querySelectorAll(".fade");const observer=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("show");});});fades.forEach(el=>observer.observe(el));const canvas=document.getElementById("particles");const ctx=canvas.getContext("2d");let p=[];function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}resize();addEventListener("resize",resize);for(let i=0;i<40;i++){p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,dx:(Math.random()-0.5)*0.5,dy:(Math.random()-0.5)*0.5});}function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);p.forEach(pt=>{ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fillStyle="rgba(0,240,255,0.7)";ctx.fill();pt.x+=pt.dx;pt.y+=pt.dy;if(pt.x<0||pt.x>canvas.width)pt.dx*=-1;if(pt.y<0||pt.y>canvas.height)pt.dy*=-1;});requestAnimationFrame(draw);}draw();</script></body></html>
